<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a routerLink="/">Inicio</a></li>
    <li class="breadcrumb-item active" aria-current="page">Mi perfil</li>
  </ol>
</nav>

<div class="row justify-content-center">
  <div class="col-lg-8">
    <section class="sweetpop-form-card p-4 p-md-5">
      <h1 class="h2 mb-2">Mi perfil</h1>
      <p class="mb-4">
        Consulta tus datos personales y actualiza tu dirección de despacho.
      </p>

      @if (alertMessage && alertType) {
        <div class="alert alert-{{ alertType }} mb-4" role="alert">{{ alertMessage }}</div>
      }

      <form (ngSubmit)="onSubmit()" novalidate>
        <div class="row g-3">
          <div class="col-12">
            <label for="fullName" class="form-label">Nombre completo</label>
            <input type="text" class="form-control sweetpop-field-readonly" id="fullName"
              [ngModel]="fullName" name="fullName" readonly autocomplete="name">
          </div>

          <div class="col-md-6">
            <label for="username" class="form-label">Nickname</label>
            <input type="text" class="form-control sweetpop-field-readonly" id="username"
              [ngModel]="username" name="username" readonly autocomplete="username">
          </div>

          <div class="col-md-6">
            <label for="email" class="form-label">Correo electrónico</label>
            <input type="email" class="form-control sweetpop-field-readonly" id="email"
              [ngModel]="email" name="email" readonly autocomplete="email">
          </div>

          <div class="col-md-6">
            <label for="birthdate" class="form-label">Fecha de nacimiento</label>
            <input type="date" class="form-control sweetpop-field-readonly" id="birthdate"
              [ngModel]="birthdate" name="birthdate" readonly>
          </div>

          <div class="col-md-6">
            <label for="signupDate" class="form-label">Fecha de registro</label>
            <input type="text" class="form-control sweetpop-field-readonly" id="signupDate"
              [ngModel]="signupDate" name="signupDate" readonly tabindex="-1">
          </div>

          <div class="col-12">
            <label for="address" class="form-label">Dirección de despacho</label>
            <textarea class="form-control" id="address" name="address" rows="3"
              [(ngModel)]="address"
              placeholder="Calle, número, comuna, región"></textarea>
          </div>
        </div>

        <div class="d-flex flex-wrap gap-2 mt-4">
          <button type="submit" class="btn btn-sweetpop">Guardar cambios</button>
          <a routerLink="/" class="btn btn-outline-light">Volver al inicio</a>
        </div>
      </form>
    </section>
  </div>
</div>
