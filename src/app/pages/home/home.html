<section class="hero mb-5">
  <div class="row align-items-center g-4">
    <div class="col-lg-6 hero-text">
      <h1 class="display-5 fw-semibold">Cajas anidadas de dulces</h1>
      <p class="intro lead">
        Sorprende con cajas con 1, 2 o 3 niveles. Cada nivel con paredes personalizables con dulces y chocolates.
      </p>
      <div class="d-flex flex-wrap gap-2">
        <a [routerLink]="['/cajas']" class="btn btn-sweetpop">Ver cajas</a>
        <a [routerLink]="['/dulces']" class="btn btn-sweetpop">Ver dulces</a>
      </div>
    </div>
    <div class="col-lg-6 hero-image text-center">
      <img src="assets/img/hero-candy.png" class="img-fluid" alt="Dulces en caja de regalo">
    </div>
  </div>
</section>

<h2 class="h3 mb-3">Catálogo de cajas</h2>
<app-box-catalog-cards view="home" rowClass="mb-5" />

<h2 class="h3 mb-3">Categorías de dulces</h2>
<app-category-catalog-cards />
