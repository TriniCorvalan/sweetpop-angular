<div class="row row-cols-1 row-cols-sm-2 row-cols-lg-4 g-4" [class]="rowClass">
  @for (category of categories; track category.category) {
    <div class="col">
      <article class="card h-100 sweetpop-card d-flex flex-column">
        <a [routerLink]="[category.route]">
          <img [src]="category.image" class="card-img-top" [alt]="getCategoryLabel(category.category)">
        </a>
        <div class="card-body d-flex flex-column flex-grow-1">
          <h3 class="card-title h5">{{ getCategoryLabel(category.category) }}</h3>
          <p class="card-text">{{ category.description }}</p>
          <p class="card-text">Descuento: {{ category.discountLabel }}</p>
          <div class="mt-auto pt-2">
            <a [routerLink]="[category.route]" class="card-link">{{ category.linkLabel }}</a>
          </div>
        </div>
      </article>
    </div>
  }
</div>
