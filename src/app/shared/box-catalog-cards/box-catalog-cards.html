<div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4" [class]="rowClass">
  @for (box of boxes; track box.id) {
    <div class="col">
      <article class="card h-100 sweetpop-card d-flex flex-column">
        <img [src]="box.image" class="card-img-top" [alt]="box.name">
        <div class="card-body d-flex flex-column flex-grow-1">
          <h3 class="card-title h5">{{ box.name }}</h3>
          <p class="card-text">{{ box.description }}</p>
          @if (view === 'catalog') {
            <p class="card-text">Precio base: {{ formatPrice(box.boxPrice) }}</p>
          }
          <p class="card-text">Descuento: {{ formatDiscount(box.discount) }}</p>
          <div class="mt-auto pt-2">
            <button type="button" class="btn btn-sweetpop btn-sm" (click)="customizeBox(box.id)">
              Personalizar esta caja
            </button>
          </div>
        </div>
      </article>
    </div>
  }
</div>
