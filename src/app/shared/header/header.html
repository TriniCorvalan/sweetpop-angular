<header class="site-header">
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top py-3">
    <div class="container">
      <a class="navbar-brand logo d-flex align-items-center gap-2" routerLink="/">
        <img src="assets/img/logo.png" alt="Logo SweetPop" width="40" height="40" class="rounded">
        SweetPop
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
              data-bs-target="#mainNav" aria-controls="mainNav"
              aria-expanded="false" aria-label="Abrir menú">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          @for (item of navItems; track item.label) {
            <li class="nav-item">
              @if (item.dulcesGroup) {
                <a class="nav-link" routerLink="/dulces" [class.active]="isDulcesActive()"
                  [attr.aria-current]="isDulcesActive() ? 'page' : null">
                  {{ item.label }}
                </a>
              } @else {
                <a class="nav-link" [routerLink]="item.route"
                  routerLinkActive="active"
                  [routerLinkActiveOptions]="{ exact: item.exact ?? false }">
                  {{ item.label }}
                </a>
              }
            </li>
          }
        </ul>
      </div>
    </div>
  </nav>
</header>
